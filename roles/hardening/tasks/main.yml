---
- name: Install hardening dependencies
  ansible.builtin.apt:
    name:
      - ufw
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: true

- name: Deploy SSH hardening config
  ansible.builtin.template:
    src: sshd_hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: "0600"
  notify: Restart sshd

- name: Deploy sysctl hardening config
  ansible.builtin.template:
    src: sysctl_hardening.conf.j2
    dest: /etc/sysctl.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Apply sysctl

- name: Configure unattended-upgrades
  ansible.builtin.template:
    src: unattended-upgrades.conf.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Enable automatic upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: "0644"

# UFW — open required ports before enabling to avoid lockout
- name: Allow SSH through firewall
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through firewall
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through firewall
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Set UFW default incoming policy to deny
  community.general.ufw:
    default: deny
    direction: incoming

- name: Enable UFW
  community.general.ufw:
    state: enabled

# ufw-docker fix — prevent Docker from bypassing UFW iptables rules
# https://github.com/chaifeng/ufw-docker
- name: Download ufw-docker script
  ansible.builtin.get_url:
    url: https://github.com/chaifeng/ufw-docker/raw/master/ufw-docker
    dest: /usr/local/bin/ufw-docker
    owner: root
    group: root
    mode: "0755"

- name: Check if ufw-docker rules are already applied
  ansible.builtin.command:
    cmd: grep -q "BEGIN UFW AND DOCKER" /etc/ufw/after.rules
  register: ufw_docker_check
  changed_when: false
  failed_when: false

- name: Apply ufw-docker fix to after.rules
  ansible.builtin.command:
    cmd: ufw-docker install
  when: ufw_docker_check.rc != 0
  notify: Reload UFW
