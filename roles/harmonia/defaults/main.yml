---
cache_name: "nixcache"
harmonia_bind: "127.0.0.1"
harmonia_port: 5000
harmonia_workers: 4
signing_key_private: "/etc/nix/cache-priv-key.pem"
signing_key_public: "/etc/nix/cache-pub-key.pem"
traefik_config_dir: "/etc/traefik"
traefik_image: "traefik:v3.3"

# Set domain_name to enable HTTPS + Let's Encrypt (e.g. "cache.example.com")
domain_name: ""
# Required when domain_name is set
acme_email: ""
